<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- css -->
    <link rel="stylesheet" href="signin.css">
    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="con">
        <div class="signin">
            <div class="img-con">
                <img src="/Margin.svg" alt="">
            </div>
            <div class="title-con">
                <h1>РусЯзык</h1>
                <p>Har kuni 20 ta so'z, bir umr bilim</p>
            </div>
            <div class="text-con">
                <h1>Ro'yxatdan o'tish</h1>
                <p>Bepul hisob yarating</p>
            </div>
            <div class="name">
                <p>TO'LIQ ISMINGIZ</p>
                <div class="name-input">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" placeholder="Ismingizni kiriting">
                </div>
            </div>
            <div class="email">
                <p>EMAIL MANZIL</p>
                <div class="email-input">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" placeholder="user@example.com">
                    <i class="fa-regular fa-circle-check"></i>
                </div>
            </div>
            <div class="password">
                <p>PAROL YARATING</p>
                <div class="password-input">
                    <i class="fa-regular fa-user"></i>
                    <input type="password" placeholder="********">
                </div>
            </div>
            <div class="password-accept">
                <p>PAROLNI TASDIQLANG</p>
                <div class="password-input">
                    <i class="fa-solid fa-shield-halved shield"></i>
                    <input type="password" placeholder="********">
                </div>
            </div>
            <div class="shartlar">
                <input type="checkbox">
                <p>Men <a href="">Foydalanish shartlari</a> va <a href="">Maxfiylik siyosatiga</a> roziman</p>
            </div>
            <div class="btn-con">
                <button class="btn">Hisob yaratish</button>
            </div>
            <div class="kirish">
                <p>Hisobingiz bormi? <a href="index.html">Kiring</a></p>
            </div>
        </div>
    </div>
</body>

</html>
