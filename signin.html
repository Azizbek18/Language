<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish - РусЯзык</title>
    <link rel="stylesheet" href="signin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</head>
<body>
    <div class="signin">
        <div class="title-con">
            <h1>РусЯзык</h1>
            <p>Har kuni 20 ta so'z, bir umr bilim</p>
        </div>
        <div class="text-con">
            <h1>Ro'yxatdan o'tish</h1>
            <p>Bepul hisob yarating</p>
        </div>

        <form id="signup-form">
            <div class="input-group">
                <p class="label">TO'LIQ ISMINGIZ</p>
                <div class="input-wrapper">
                    <i class="fa-regular fa-user"></i>
                    <input id="ism" type="text" placeholder="Ismingizni kiriting" required>
                </div>
            </div>

            <div class="input-group">
                <p class="label">EMAIL MANZIL</p>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                    <input id="email" type="email" placeholder="user@example.com" required>
                </div>
            </div>

            <div class="input-group">
                <p class="label">PAROL YARATING</p>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input id="password" type="password" placeholder="********" required>
                </div>
            </div>

            <div class="input-group">
                <p class="label">PAROLNI TASDIQLANG</p>
                <div class="input-wrapper">
                    <i class="fa-solid fa-shield-halved"></i>
                    <input id="password-accept" type="password" placeholder="********" required>
                </div>
            </div>

            <div class="shartlar">
                <input type="checkbox" id="terms" required>
                <label for="terms">Men foydalanish shartlariga roziman</label>
            </div>

            <div class="btn-con">
                <button type="submit" class="btn">Hisob yaratish</button>
            </div>

            <div class="kirish-link">
                <p>Hisobingiz bormi? <a href="index.html">Kiring</a></p>
            </div>
        </form>
    </div>

    <script src="signin.js"></script>
</body>
</html>
