                    <h3>Turi</h3>
                    <select>
                        <option>Turini tanlang</option>
                        <option>Oila</option>
                        <option>kundalik sayohat</option>
                        <option>oziq ovqat</option>
                        <option>dostlar</option>

                </div>
                <div class="modal-btn">
                    <button onclick="Yubor()" id="qoshish">Qo'shish</button>
                    <h3 id="cancel">Cancel</h3>
                </div>
            </div>
        </div>

                </div>
                <div class="head-items">
